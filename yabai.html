<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銀河神話級・称賛システム</title>
    <style>
        /* 激しい虹色背景 */
        @keyframes bg-praise {
            0% { background: #ff0000; } 20% { background: #ffff00; }
            40% { background: #00ff00; } 60% { background: #00ffff; }
            80% { background: #0000ff; } 100% { background: #ff00ff; }
        }
        /* 画面全体の振動 */
        @keyframes shake {
            0% { transform: translate(0,0) scale(1); }
            25% { transform: translate(-15px, 15px) scale(1.1); }
            75% { transform: translate(15px, -15px) scale(1.1); }
            100% { transform: translate(0,0) scale(1); }
        }
        /* 文字が飛び出す */
        @keyframes text-zoom {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #111; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white;
        }

        #ui-layer {
            z-index: 1000; text-align: center; background: rgba(0,0,0,0.8);
            padding: 40px; border: 5px solid gold; border-radius: 30px;
        }

        input {
            width: 80%; padding: 15px; font-size: 1.5rem; border-radius: 10px;
            border: none; margin-bottom: 20px; outline: none;
        }

        button {
            padding: 20px 40px; font-size: 2rem; font-weight: bold;
            background: linear-gradient(to bottom, #ffeb3b, #f57f17);
            border: none; border-radius: 50px; cursor: pointer; color: #000;
            box-shadow: 0 0 20px gold;
        }

        /* 称賛オーバーレイ */
        #praise-overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000;
            background-size: cover; pointer-events: none;
        }

        .huge-title {
            font-size: 10vw; color: gold; text-shadow: 5px 5px 0 #000, -5px -5px 0 #ff0000, 0 0 50px #fff;
            animation: text-zoom 0.3s forwards; line-height: 1; text-align: center;
        }

        .sub-msg {
            font-size: 3rem; background: gold; color: black; padding: 10px 40px;
            margin-bottom: 20px; transform: skewX(-15deg);
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>全人類の希望、ここに入力。</h1>
    <input type="text" id="userInput" placeholder="例：コーヒーを淹れた">
    <br>
    <button onclick="ignite()">神 域 称 賛</button>
</div>

<div id="praise-overlay">
    <div id="target-text" class="sub-msg"></div>
    <div id="praise-msg" class="huge-title"></div>
</div>

<script>
    const phrases = [
        "新 世界 の 神", "宇 宙 創 造 主", "全 知 全 能", "歴 史 の 特 異 点", 
        "人 類 の 到 達 点", "恒 星 級 の 輝 き", "概 念 上 の 最 強",
        "生 ける 伝 説", "銀 河 系 覇 者", "時 空 を 超 え し 者"
    ];

    function playSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 1);
    }

    function ignite() {
        const val = document.getElementById('userInput').value;
        if(!val) return;

        playSound();

        // UIを隠して背景を激しく
        document.getElementById('ui-layer').style.display = 'none';
        document.body.style.animation = 'bg-praise 0.1s infinite, shake 0.1s infinite';

        // メッセージ表示
        const overlay = document.getElementById('praise-overlay');
        document.getElementById('target-text').innerText = `【 ${val} 】`;
        document.getElementById('praise-msg').innerText = phrases[Math.floor(Math.random()*phrases.length)];
        overlay.style.display = 'flex';

        // 3秒後に強制リセット（リロードが一番確実で軽いです！）
        setTimeout(() => {
            location.reload();
        }, 3000);
    }
</script>
</body>
</html>
